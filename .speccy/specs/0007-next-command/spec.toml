schema_version = 1

[[requirements]]
id = "REQ-001"
checks = ["CHK-001", "CHK-002"]

[[requirements]]
id = "REQ-002"
checks = ["CHK-003", "CHK-004"]

[[requirements]]
id = "REQ-003"
checks = ["CHK-005", "CHK-006"]

[[requirements]]
id = "REQ-004"
checks = ["CHK-007", "CHK-008"]

[[requirements]]
id = "REQ-005"
checks = ["CHK-009"]

[[checks]]
id = "CHK-001"
kind = "test"
command = "cargo test -p speccy-core --test next_priority -- default_within_spec_preference"
proves = "Within a spec, [?] review-ready tasks are preferred over [ ] open tasks when no --kind is supplied; [~] tasks are always skipped."

[[checks]]
id = "CHK-002"
kind = "test"
command = "cargo test -p speccy-core --test next_priority -- lowest_spec_id_wins"
proves = "Across specs, the lowest spec ID with actionable work wins regardless of which kind of task; the spec-ID ordering dominates the within-spec preference."

[[checks]]
id = "CHK-003"
kind = "test"
command = "cargo test -p speccy-core --test next_priority -- kind_implement_filter"
proves = "--kind implement returns only [ ] tasks; never falls back to [?] tasks even when no [ ] is available; returns blocked instead."

[[checks]]
id = "CHK-004"
kind = "test"
command = "cargo test -p speccy-core --test next_priority -- kind_review_filter"
proves = "--kind review returns only [?] tasks with persona fan-out [business, tests, security, style]; never falls back to [ ] tasks; returns blocked instead."

[[checks]]
id = "CHK-005"
kind = "test"
command = "cargo test -p speccy-core --test next_priority -- report_kind"
proves = "When all tasks across all specs are [x] AND at least one spec lacks REPORT.md, the result is kind=report for the lowest spec ID missing REPORT.md."

[[checks]]
id = "CHK-006"
kind = "test"
command = "cargo test -p speccy-core --test next_priority -- blocked_kind_reasons"
proves = "Blocked variant carries one of a small set of canonical reason strings; empty workspace, all-claimed [~] tasks, and filter-with-no-match each produce the expected reason."

[[checks]]
id = "CHK-007"
kind = "test"
command = "cargo test -p speccy-cli --test next_json -- envelope_and_variants"
proves = "speccy next --json emits schema_version=1 envelope; the kind field discriminates four variants (implement, review, report, blocked) with the field shapes from DESIGN.md and SPEC.md."

[[checks]]
id = "CHK-008"
kind = "test"
command = "cargo test -p speccy-cli --test next_json -- determinism"
proves = "Two back-to-back speccy next --json invocations against identical workspace state produce byte-identical stdout."

[[checks]]
id = "CHK-009"
kind = "test"
command = "cargo test -p speccy-cli --test next_text -- one_line_per_kind"
proves = "Text mode prints one line per kind variant matching the contract; exit code is 0 for all four kinds (blocked is not an error)."
