schema_version = 1

[[requirements]]
id = "REQ-001"
checks = ["CHK-001", "CHK-002", "CHK-007"]

[[requirements]]
id = "REQ-002"
checks = ["CHK-003"]

[[requirements]]
id = "REQ-003"
checks = ["CHK-004", "CHK-005"]

[[requirements]]
id = "REQ-004"
checks = ["CHK-006"]

[[requirements]]
id = "REQ-005"
checks = ["CHK-008"]

[[requirements]]
id = "REQ-006"
checks = ["CHK-009"]

[[requirements]]
id = "REQ-007"
checks = ["CHK-010", "CHK-011"]

[[requirements]]
id = "REQ-008"
checks = ["CHK-012"]

[[checks]]
id = "CHK-001"
kind = "test"
command = "cargo test -p speccy-core --lib parse::toml_files::tests::parses"
proves = "Valid speccy.toml and spec.toml fixtures round-trip into typed structs in declared order."

[[checks]]
id = "CHK-002"
kind = "test"
command = "cargo test -p speccy-core --lib parse::toml_files::tests::rejects_check"
proves = "spec.toml [[checks]] entries require exactly one of command or prompt; neither or both is an error naming the check ID."

[[checks]]
id = "CHK-003"
kind = "test"
command = "cargo test -p speccy-core --lib parse::frontmatter::tests"
proves = "Frontmatter splitter handles valid, missing, malformed, body-with-hr, and CRLF inputs without panicking."

[[checks]]
id = "CHK-004"
kind = "test"
command = "cargo test -p speccy-core --lib parse::spec_md::tests::skips_req_headings_inside_fenced_code"
proves = "SPEC.md parser extracts REQ headings and never emits one that lived inside a fenced code block."

[[checks]]
id = "CHK-005"
kind = "test"
command = "cargo test -p speccy-core --lib -- parse::spec_md::tests::changelog parse::spec_md::tests::sha256"
proves = "SPEC.md parser extracts Changelog rows and computes a stable sha256 that changes on any byte edit."

[[checks]]
id = "CHK-006"
kind = "test"
command = "cargo test -p speccy-core --lib parse::tasks_md::tests"
proves = "TASKS.md parser extracts task state, IDs, covers, notes, and suggested files; malformed task IDs are surfaced as recoverable warnings."

[[checks]]
id = "CHK-007"
kind = "test"
command = "cargo test -p speccy-core --lib parse::toml_files::tests::rejects_unknown_schema_version"
proves = "Unknown schema_version values in speccy.toml or spec.toml are rejected with a clear error naming the file and value."

[[checks]]
id = "CHK-008"
kind = "test"
command = "cargo test -p speccy-core --lib parse::report_md::tests"
proves = "REPORT.md frontmatter rejects invalid outcome values and missing required fields; body returns verbatim."

[[checks]]
id = "CHK-009"
kind = "test"
command = "cargo test -p speccy-core --lib parse::cross_ref::tests"
proves = "Cross-reference between parsed SPEC.md and spec.toml is symmetric, deterministic, and idempotent."

[[checks]]
id = "CHK-010"
kind = "command"
command = "cargo clippy -p speccy-core --all-targets --all-features -- -D warnings"
proves = "speccy-core compiles clean under the project's clippy gate with no warnings."

[[checks]]
id = "CHK-011"
kind = "command"
command = "cargo deny check"
proves = "Workspace dependency surface is clean (advisories, bans, licenses, sources) per project policy."

[[checks]]
id = "CHK-012"
kind = "test"
command = "cargo test -p speccy-core --lib parse::supersession::tests"
proves = "supersession_index inverts supersedes declarations across a workspace and surfaces dangling references for lint to consume."
