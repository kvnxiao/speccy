[[checks]]
id = "CHK-001"
kind = "test"
command = "cargo test -p speccy-cli --test skill_packs -- modules_are_single_source"
proves = "resources/modules/{personas,prompts,skills}/ are the only source-of-truth bodies for personas, prompts, and skill bodies; no per-host file under resources/agents/ duplicates a module body verbatim outside its `{% include %}` directive."

[[checks]]
id = "CHK-002"
kind = "test"
command = "cargo test -p speccy-cli --test embedded -- resources_bundle_contains_modules_and_agents"
proves = "The embedded RESOURCES bundle exposes both `modules/` (with `personas/`, `prompts/`, `skills/` subtrees) and `agents/` (with per-host subtrees) as walkable directories, and the legacy `skills/` tree is absent from the workspace and from the bundle."

[[checks]]
id = "CHK-003"
kind = "test"
command = "cargo test -p speccy-cli --test init -- render_claude_code_skill_pack"
proves = "speccy init --host claude-code renders the seven SKILL.md files at `.claude/skills/speccy-<verb>/SKILL.md` with slash-prefixed command references (e.g. `/speccy-tasks`); does not create any path under `.agents/` or `.codex/`."

[[checks]]
id = "CHK-004"
kind = "test"
command = "cargo test -p speccy-cli --test init -- render_codex_skill_pack"
proves = "speccy init --host codex renders the seven SKILL.md files at `.agents/skills/speccy-<verb>/SKILL.md` with unprefixed command references; does not create any path under `.claude/`. Codex subagent files land under `.codex/agents/` in the same run."

[[checks]]
id = "CHK-005"
kind = "test"
command = "cargo test -p speccy-cli --test init -- render_claude_code_reviewer_subagents"
proves = "speccy init --host claude-code renders six files at `.claude/agents/reviewer-{business,tests,security,style,architecture,docs}.md`, each with YAML frontmatter declaring `name: reviewer-<persona>` and a `description:` string, followed by the matching persona body content from resources/modules/personas/."

[[checks]]
id = "CHK-006"
kind = "test"
command = "cargo test -p speccy-cli --test init -- render_codex_reviewer_subagents_parse_as_toml"
proves = "speccy init --host codex renders six files at `.codex/agents/reviewer-{business,tests,security,style,architecture,docs}.toml`, each parses as TOML and contains string-typed top-level keys `name`, `description`, and `developer_instructions`; persona body files contain no `\"\"\"` substring (TOML-safety invariant)."

[[checks]]
id = "CHK-007"
kind = "test"
command = "cargo test -p speccy-cli --test skill_packs -- speccy_review_skill_prefers_native_subagents"
proves = "Claude Code's rendered .claude/skills/speccy-review/SKILL.md step 4 references the Task tool with subagent_type values for the four default reviewer personas; Codex's rendered .agents/skills/speccy-review/SKILL.md step 4 references the four reviewer subagents by name in prose; both rendered files include a fallback paragraph pointing at `speccy review TASK-ID --persona X`."

[[checks]]
id = "CHK-008"
kind = "test"
command = "cargo test -p speccy-cli --test init -- dogfood_outputs_match_committed_tree"
proves = "Running speccy init --force --host claude-code followed by speccy init --force --host codex into a worktree-rooted tempdir produces outputs byte-identical to the committed dogfood tree under `.claude/`, `.agents/`, `.codex/`, `.speccy/skills/`."

[[checks]]
id = "CHK-009"
kind = "test"
command = "cargo test -p speccy-cli --test init -- render_is_idempotent"
proves = "Rendering the full host pack for either host into the same tempdir twice in succession produces byte-identical file contents on the second pass."

[[checks]]
id = "CHK-010"
kind = "test"
command = "cargo test -p speccy-cli --test init -- rendered_outputs_have_no_unsubstituted_tokens"
proves = "No rendered output file contains the literal substrings `{{` or `{%` outside fenced code blocks where skill bodies intentionally reference example template syntax. DEC-004 establishes that no `{% raw %}`-wrapped regions exist in the actual implementation, so the test scans for unsubstituted tokens by walking line-by-line outside fenced code blocks."
