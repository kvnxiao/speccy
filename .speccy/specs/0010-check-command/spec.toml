schema_version = 1

[[requirements]]
id = "REQ-001"
checks = ["CHK-001", "CHK-002"]

[[requirements]]
id = "REQ-002"
checks = ["CHK-003"]

[[requirements]]
id = "REQ-003"
checks = ["CHK-004", "CHK-005"]

[[requirements]]
id = "REQ-004"
checks = ["CHK-006"]

[[requirements]]
id = "REQ-005"
checks = ["CHK-007"]

[[requirements]]
id = "REQ-006"
checks = ["CHK-008"]

[[checks]]
id = "CHK-001"
kind = "test"
command = "cargo test -p speccy --test check -- discovers_workspace_checks"
proves = "speccy check enumerates every [[checks]] across all spec.toml files in (spec_id ascending, declared check order) order."

[[checks]]
id = "CHK-002"
kind = "test"
command = "cargo test -p speccy --test check -- empty_and_malformed_workspaces"
proves = "Empty workspace prints 'No checks defined.' and exits 0; malformed spec.toml is skipped with a stderr warning and contributes exit code 1."

[[checks]]
id = "CHK-003"
kind = "test"
command = "cargo test -p speccy --test check -- id_filter"
proves = "speccy check CHK-NNN runs only matching IDs (across all specs where that ID exists); unknown ID exits 1; malformed ID format exits 1."

[[checks]]
id = "CHK-004"
kind = "test"
command = "cargo test -p speccy --test check -- shell_selection_and_cwd"
proves = "Unix uses sh -c; Windows uses cmd /c; working directory is the project root containing .speccy/."

[[checks]]
id = "CHK-005"
kind = "test"
command = "cargo test -p speccy --test check -- live_streaming"
proves = "Child stdout/stderr stream live to the terminal via inherited stdio; speccy prints header (==>) and footer (<--) lines around each executable check."

[[checks]]
id = "CHK-006"
kind = "test"
command = "cargo test -p speccy --test check -- exit_code_first_nonzero"
proves = "All executable checks run regardless of earlier failures; exit code is the first non-zero exit code from any check; manual checks don't affect exit code."

[[checks]]
id = "CHK-007"
kind = "test"
command = "cargo test -p speccy --test check -- manual_rendering"
proves = "Manual checks (kind=manual or any kind with prompt but no command) print the prompt and a MANUAL footer; never spawn subprocesses; never affect exit code."

[[checks]]
id = "CHK-008"
kind = "test"
command = "cargo test -p speccy --test check -- summary_line"
proves = "Final summary '<N> passed, <M> failed, <K> manual' is the last stdout line regardless of pass/fail outcome; empty workspace prints 'No checks defined.' instead."
